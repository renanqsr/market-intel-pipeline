name: Market Data Monitor

on:
  schedule:
    - cron: "0 12 * * *"   # Todo dia às 9h da manhã (Brasília)
  workflow_dispatch:        # Botão para rodar manualmente

jobs:
  scrape:
    name: Coletar preços
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Permissão para o robô salvar o arquivo no seu GitHub

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Instalar dependências
        run: |
          pip install requests beautifulsoup4

      - name: 📁 Preparar ambiente
        run: |
          mkdir -p data logs
          touch data/.gitkeep logs/.gitkeep

      - name: 🔍 Rodar scraper
        run: python scraper.py

      - name: 🚀 Commit e Push
        run: |
          git config --global user.name "renanqsr"
          git config --global user.email "renan.queiroz08sr@gmail.com"
          
          if [ -f data/market_trends.csv ]; then
            git add data/market_trends.csv
            
            if git diff --staged --quiet; then
              echo "Nenhuma alteração detectada no CSV."
            else
              git commit -m "chore(data): market trends updated $(date +'%Y-%m-%d %H:%M')"
              git pull --rebase origin main
              git push origin main
            fi
          else
            echo "Erro: market_trends.csv não foi gerado."
            exit 1
          fi

      - name: 📋 Guardar Log (Artefato)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_number }}
          path: logs/scraper.log
          retention-days: 5